name: Daily Automation (AEGIS)

on:
  schedule:
    - cron: "0 3 * * *"   # daily 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: daily-automation
  cancel-in-progress: false

jobs:
  killswitch:
    runs-on: ubuntu-latest
    outputs:
      paused: ${{ steps.check.outputs.paused }}
    steps:
      - uses: actions/checkout@v6
      - id: check
        run: |
          if [ -f automation/PAUSE ]; then
            echo "paused=true" >> $GITHUB_OUTPUT
            echo "::warning::Automation PAUSED (automation/PAUSE present)"
          else
            echo "paused=false" >> $GITHUB_OUTPUT
          fi

  content-engine:
    needs: killswitch
    if: needs.killswitch.outputs.paused == 'false'
    runs-on: ubuntu-latest
    # P2-S4: every withJob() invocation now writes a row to the
    # agent_actions audit table via /api/admin/agent-actions. Both env
    # vars below feed the audit call. If either is missing the audit
    # silently no-ops — the agent itself keeps running.
    env:
      SITE_URL:         https://www.aegibit.com
      DASHBOARD_SECRET: ${{ secrets.DASHBOARD_SECRET }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: node automation/scripts/generate-blog-post.mjs
      - run: node automation/scripts/generate-seo-pages.mjs --count=5
      - name: Open PR with daily content drop
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(automation): daily content drop"
          author: "AEGIS Bot <contact@aegibit.com>"
          committer: "AEGIS Bot <contact@aegibit.com>"
          branch: automation/daily-content
          delete-branch: true
          title: "chore(automation): daily content drop ${{ github.run_id }}"
          body: |
            **Tier T0** — auto-generated content drop per AUTOMATION_POLICY.md §6.1.

            - 1 new blog post
            - Up to 5 new programmatic SEO pages

            **Auto-merge enabled.** Vercel preview must be green; if build fails, this PR holds for human review.
          labels: |
            automation
            content-drop
      - name: Enable auto-merge on content PR
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} \
            --repo ${{ github.repository }} \
            --squash \
            --auto \
            --delete-branch

  seo-watch:
    needs: killswitch
    if: needs.killswitch.outputs.paused == 'false'
    runs-on: ubuntu-latest
    env:
      SITE_URL:         https://www.aegibit.com
      DASHBOARD_SECRET: ${{ secrets.DASHBOARD_SECRET }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "20" }
      - run: node automation/scripts/seo-audit.mjs
      - run: node automation/scripts/ping-search-engines.mjs

  security-sweep:
    needs: killswitch
    if: needs.killswitch.outputs.paused == 'false'
    runs-on: ubuntu-latest
    env:
      SITE_URL:         https://www.aegibit.com
      DASHBOARD_SECRET: ${{ secrets.DASHBOARD_SECRET }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "20" }
      - run: |
          mkdir -p automation/logs
          npm audit --json > automation/logs/audit.json || true
      - run: node automation/scripts/audit-report.mjs automation/logs/audit.json

  performance-watch:
    needs: killswitch
    if: needs.killswitch.outputs.paused == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://www.aegibit.com
            https://www.aegibit.com/products/paymint
            https://www.aegibit.com/products/aira
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true

  lead-pipeline-health:
    needs: killswitch
    if: needs.killswitch.outputs.paused == 'false'
    runs-on: ubuntu-latest
    env:
      SITE_URL:                  https://www.aegibit.com
      DASHBOARD_SECRET:          ${{ secrets.DASHBOARD_SECRET }}
      SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "20" }
      - run: node automation/scripts/lead-health-check.mjs

  outbound-engine:
    # Generates 5 personalized cold-email drafts/day from automation/data/icp-seed.json,
    # writes a single markdown report under automation/reports/outbound/, and opens
    # a PR with NO auto-merge — Rahul reviews every draft before any send.
    # Tier T1 (acts on outside parties' inboxes once Rahul approves).
    needs: killswitch
    if: needs.killswitch.outputs.paused == 'false'
    runs-on: ubuntu-latest
    env:
      SITE_URL:         https://www.aegibit.com
      DASHBOARD_SECRET: ${{ secrets.DASHBOARD_SECRET }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with: { node-version: "20" }
      - run: node automation/scripts/outbound-draft.mjs
      - name: Open PR with outbound drafts (manual review)
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(outbound): daily draft batch"
          author: "AEGIS Bot <contact@aegibit.com>"
          committer: "AEGIS Bot <contact@aegibit.com>"
          branch: automation/outbound-drafts
          delete-branch: true
          title: "chore(outbound): daily draft batch ${{ github.run_id }}"
          body: |
            **Tier T1** — auto-generated cold-email drafts per AUTOMATION_POLICY.md §6.
            **NO auto-merge.** Review each draft, look up the recipient's email, edit as needed, and send manually via your inbox tool of choice. Close this PR (or merge it as historical record) when done.

            - Drafts: `automation/reports/outbound/<date>.md`
            - Seed:   `automation/data/icp-seed.json` — top up with new ICPs as the seed depletes
            - State:  `automation/state.json` — `metrics.usedOutboundCompanies` deduplicates so the same company is never drafted twice

            Compliance reminder: respect DPDP / GDPR / CAN-SPAM. Drafts include a soft "reply 'no thanks'" opt-out; do not send to anyone who's previously opted out.
          labels: |
            automation
            outbound
