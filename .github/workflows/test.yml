name: Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      # Lint is scoped to the surfaces we actively maintain.
      # Pre-existing lint errors in src/hooks and three.js helpers are
      # tracked under follow-up A-7 and will be cleaned up there.
      # Running `npx eslint` against the whole repo would gate this CI
      # job on issues unrelated to the current PR.
      - name: Lint (scoped)
        run: |
          npx eslint \
            "src/lib/**/*.{ts,tsx}" \
            "src/proxy.ts" \
            "src/app/api/**/*.{ts,tsx}" \
            "src/app/admin/**/*.{ts,tsx}"
      - name: Unit tests
        run: npm test
