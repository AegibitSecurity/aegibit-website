name: Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      # Repo-wide lint gate. Previously scoped to src/lib + proxy +
      # api + admin because src/hooks and src/components/three carried
      # 11+ pre-existing errors (tracked as follow-up A-7). Those are
      # now resolved (see PR for details) so the gate runs across the
      # whole repo — every new commit is held to the same purity,
      # set-state-in-effect, and exhaustive-deps standards.
      - name: Lint
        run: npx eslint .
      - name: Unit tests
        run: npm test
