<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Black rounded square background — keeps the shield crisp on every theme -->
  <rect width="512" height="512" rx="96" fill="#000000"/>

  <!-- Solid orange shield — the orange-only fill creates the iconic outline ring -->
  <path d="M256 64
           L96 130
           L96 268
           Q96 380, 256 478
           Q416 380, 416 268
           L416 130 Z"
        fill="#F97316"/>

  <!-- Inner cutout in black — sits inside the orange shape so the orange
       reads as a bold ring, exactly matching the brand mark -->
  <path d="M256 100
           L128 152
           L128 268
           Q128 358, 256 440
           Q384 358, 384 268
           L384 152 Z"
        fill="#000000"/>

  <!-- White checkmark — bold, with the long arm sweeping up & out past
       the upper-right of the shield (per the brand reference) -->
  <path d="M168 282 L240 358 L378 188"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="46"
        stroke-linecap="round"
        stroke-linejoin="round"/>
</svg>
